spring:
  application:
    name: Nexus | Workflow Execution Platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/execution_os}
    username: ${SPRING_DATASOURCE_USERNAME:execution_user}
    password: ${SPRING_DATASOURCE_PASSWORD:secure123}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Nexus | Workflow Execution Platform
    description: Production monitoring endpoints
    version: 0.0.1-SNAPSHOT

springdoc:
  swagger-ui:
    path: /swagger-ui.html
